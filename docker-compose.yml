services:
  app:
    build: .
    ports:
      - "80:80"
      - "443:443"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      ADMIN_SETUP_TOKEN: ${ADMIN_SETUP_TOKEN:-changeme}
      # optional for discord integration
      DISCORD_SERVER_ID: ${DISCORD_SERVER_ID:-}
      # optional flags for database connect - only use if your db is on a different server
      DB_SSL_CA: ${DB_SSL_CA:-}
      DB_SSL_CERT: ${DB_SSL_CERT:-}
      DB_SSL_KEY: ${DB_SSL_KEY:-}
      DB_SSL_VERIFY: ${DB_SSL_VERIFY:-true}
    volumes:
      - ./.env:/var/www/html/.env # Laravel reads this directly — no env vars needed here
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    environment:
      # Docker Compose resolves these from .env automatically
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
