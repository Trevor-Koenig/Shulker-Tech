services:
  db:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: ShulkerTech.Web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - SETUP_CODE=${SETUP_CODE:?SETUP_CODE env var is required}
      - Email__ApiKey=${RESEND_API_KEY:?RESEND_API_KEY env var is required}
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - dataprotection:/root/.aspnet/DataProtection-Keys
      - ./backups:/backups
      - wiki-uploads:/app/wwwroot/uploads/wiki
    depends_on:
      - db

volumes:
  pgdata:
  dataprotection:
  wiki-uploads:
